<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cellspacing dan CellPadding</title>
</head>
<body>
    <center>
        <table border cellspacing="10" cellpadding="15">
            <tr>
                <td>baris kol 1</td>
                <td>barsi kol 2</td>
            </tr>
            <tr>
                <td>baris2 kol 1</td>
                <td>barsi2 kol 2</td>
            </tr>
            <tr>
                <td>baris3 kol 1</td>
                <td>barsi3 kol 2</td>
            </tr>
        </table>
    </center>
</body>
</html>
