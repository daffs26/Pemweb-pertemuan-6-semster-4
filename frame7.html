<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atribut scrolling</title>
</head>
<body>
    <frameset rows="25%,50%,25%">
        <frame src="1.html" scrolling="no">
        <frame src="2.html" scrolling="yes">
        <frame src="3.html" scrolling="auto">
    </frameset>
</body>
</html>
