<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Penggabungan 2 kolom menjadi 1 kolom</title>
</head>
<body>
    <center>
        <table border="10" cellspacing="10" cellpadding="15">
            <tr>
                <td>Kol 1</td>
                <td>Kol 2</td>
                <td>Kol 3</td>
            </tr>

            <tr>
                <td>Kol 1</td>
                <td colspan="2">Kol 2 dan Kol 3</td>
            </tr>
        </table>
    </center>
</body>
</html>
