<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Variasi frame baris dan kolom</title>
</head>
<body>
    <frameset rows="100%" cols="30%, *">
        <frame src="1.html">
        <frameset rows="25%,25%,25%,25%">
            <frame src="2.html">
            <frame src="3.html">
            <frame src="4.html">
            <frame src="5.html">
        </frameset>
    </frameset>
</body>
</html>
